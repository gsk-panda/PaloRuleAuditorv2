# Apache configuration for PaloRuleAuditor
# Place this in /etc/httpd/conf.d/panoruleauditor.conf

<VirtualHost *:80>
    ServerName panoruleauditor.example.com
    DocumentRoot /var/www/html/panoruleauditor

    # Proxy settings for the Node.js application
    ProxyPass / http://localhost:3010/
    ProxyPassReverse / http://localhost:3010/

    # Remove timeout restrictions
    ProxyTimeout 0
    Timeout 0

    # Additional recommended settings
    <Proxy *>
        Order deny,allow
        Allow from all
    </Proxy>

    # Enable compression for better performance
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript application/javascript application/json
    </IfModule>

    # Logging configuration
    ErrorLog /var/log/httpd/panoruleauditor-error.log
    CustomLog /var/log/httpd/panoruleauditor-access.log combined
</VirtualHost>
